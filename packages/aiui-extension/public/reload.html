<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>aiui — reload surface</title>
  </head>
  <body>
    <!--
      Deliberately inert. This page exists so that something OUTSIDE the browser
      can reload the extension: `chrome.runtime.reload()` can only be called from
      an extension context, and an MV3 service worker idle-terminates within
      ~30s, leaving no context to attach to. `aiui extension reload` (and the
      reload that ends every `aiui extension dev` startup) opens this page in a
      background tab over CDP, evaluates chrome.runtime.reload() in it, and
      closes it — Chrome tears it down with the rest of the extension anyway.

      No script, no state: it must be safe to open at any moment, in any tab,
      in either artifact (dist-dev/ and dist/ both carry it, via public/).
    -->
    <p>aiui: this page exists only so the extension can be reloaded from outside the browser.</p>
  </body>
</html>
