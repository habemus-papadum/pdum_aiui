<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Apply the saved color mode before first paint (light default, no flash). -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem("aiui-theme") === "dark" ? "dark" : "light";
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>seismos — aiui demo app</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pages/seismos/main.tsx"></script>
  </body>
</html>
