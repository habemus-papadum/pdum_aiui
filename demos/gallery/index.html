<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The gallery is a dark-only journal: stamp dark before first paint (no
         flash). site/theme.ts re-asserts it and reads it for literal colors. -->
    <script>
      document.documentElement.dataset.theme = "dark";
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <!-- The shell sets the per-notebook title on route changes (src/main.tsx). -->
    <title>aiui notebooks</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
