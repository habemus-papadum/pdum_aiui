name: release

# The ONLY publish path. There is no local release script and no tag trigger,
# which is what makes a local/CI double-publish impossible. Run from the Actions
# UI (release -> Run workflow) or: gh workflow run release.yml -f bump=minor

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release size relative to the last release tag"
        type: choice
        options: [patch, minor, major]
        default: minor
      skip_ci_check:
        description: "Release even if this commit's CI isn't green (skip the gate)"
        type: boolean
        default: false
      dry_run:
        description: "Compute the version + show the diff, but do NOT commit/tag/publish"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gate:
    if: ${{ !inputs.skip_ci_check }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # read ci.yml run status
    steps:
      - name: Wait for ci.yml and require success on ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          jq_row='if length>0 then (.[0] | [.status, (.conclusion // ""), .url] | @tsv) else "" end'
          for i in $(seq 1 60); do # up to ~30 min (60 x 30s)
            ROW=$(gh run list -w ci.yml -c "$SHA" -e push -L 1 --json status,conclusion,url --jq "$jq_row")
            if [ -z "$ROW" ]; then echo "no ci.yml push run for $SHA yet... ($i/60)"; sleep 30; continue; fi
            IFS=$'\t' read -r STATUS CONCL URL <<<"$ROW"
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCL" = "success" ]; then echo "::notice::CI green on $SHA"; exit 0; fi
              echo "::error::ci.yml concluded '$CONCL' on $SHA ($URL) — fix CI, or re-dispatch with skip_ci_check=true."
              exit 1
            fi
            echo "ci.yml still $STATUS on $SHA... ($i/60)"
            sleep 30
          done
          echo "::error::timed out waiting for ci.yml on $SHA"
          exit 1

  prepare:
    needs: [gate]
    if: ${{ !cancelled() && needs.gate.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need every tag for latest-tag
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Compute this release's version
        id: ver
        run: |
          RELEASE=$(node scripts/versioning.mjs compute-release "${{ inputs.bump }}")
          LAST=$(node scripts/versioning.mjs latest-tag)
          echo "Last release: ${LAST:-<none>} -> this release: $RELEASE"
          echo "version=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=v$RELEASE" >> "$GITHUB_OUTPUT"

      - name: Write the release version across every package.json
        run: |
          node scripts/versioning.mjs set "${{ steps.ver.outputs.version }}"
          pnpm install --lockfile-only
          {
            echo "### Release ${{ steps.ver.outputs.version }}"
            echo ''
            echo '```'
            git --no-pager diff --stat
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dry run — stop here (no commit/tag/publish)
        if: ${{ inputs.dry_run }}
        run: echo "::notice::DRY RUN — computed ${{ steps.ver.outputs.version }} but did not commit, tag, or publish."

      - name: Commit, tag, push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "${{ steps.ver.outputs.version }}"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "${{ steps.ver.outputs.version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}" "refs/tags/${{ steps.ver.outputs.tag }}"

  npm-publish:
    needs: [prepare]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: both the trusted-publishing auth AND provenance
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build

      - name: Publish to npm (OIDC trusted publishing — no token)
        run: |
          # Trusted publishing: no NPM_TOKEN. The id-token:write permission above
          # lets npm do the OIDC handshake, so auth comes from this workflow's
          # identity (habemus-papadum/pdum_aiui · release.yml), which each package
          # trusts (set once via `pnpm npm:trust`). Provenance is automatic.
          #
          # We pack with pnpm (rewrites workspace:^ -> ^<release>) and publish each
          # tarball with `npm publish`, because `npm` — not `pnpm` — speaks the OIDC
          # handshake (pnpm #9812 / #11513). Needs npm >= 11.5.1; ensure a current one.
          npm install -g npm@latest
          node scripts/npm-provision.mjs publish

  github-release:
    needs: [prepare, npm-publish]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      # Check out the TAG, not the dispatch SHA: the tag carries the real
      # release version across every package.json AND every Chrome manifest
      # (scripts/versioning.mjs stamped them in `prepare`), so the .vsix and the
      # extension zip come out correctly versioned rather than `X.Y.Z+dev`.
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # Both builds are source-first (esbuild/tsx transpile the linked workspace
      # deps), so a plain install is the only prep — no `pnpm -r build` needed.
      - run: pnpm install --frozen-lockfile

      # The VS Code extension. `vsix` runs build-extension.mjs, which stages a
      # VS Code-shaped manifest (strips the `+dev` metadata) and packs it with
      # vsce → packages/aiui-vscode/dist/aiui-vscode.vsix. Install locally with
      # `code --install-extension aiui-vscode.vsix`.
      - name: Build the VS Code extension (.vsix)
        run: pnpm --filter @habemus-papadum/aiui-vscode run vsix

      # The Chrome (MV3) extension — the intent client's browser shell. build:ext
      # emits the unpacked dir dist-ext/; we rename it to a friendly top-level
      # folder and zip that, so a user unzips `aiui-chrome-<version>/` and points
      # chrome://extensions (Developer mode → Load unpacked) straight at it.
      # NOTE: this is only for installing into a user's *everyday* Chrome — the
      # managed session browser already auto-loads dist-ext/ over CDP.
      - name: Build the Chrome extension (unpacked) and zip it
        run: |
          pnpm --filter @habemus-papadum/aiui-intent-client run build:ext
          cd packages/aiui-intent-client
          mv dist-ext "aiui-chrome-${VERSION}"
          zip -r "aiui-chrome-${VERSION}.zip" "aiui-chrome-${VERSION}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            packages/aiui-vscode/dist/aiui-vscode.vsix
            packages/aiui-intent-client/aiui-chrome-*.zip

  # Publish the demos/gallery static site to S3 + invalidate CloudFront, the same
  # way npm-publish talks to npm: over OIDC, with NO stored secret. The job's
  # id-token lets aws-actions/configure-aws-credentials assume the IAM role
  # `pdum-aiui-gallery-publish`, whose trust policy allows ONLY this repo's
  # release.yml on refs/heads/main (sub claim) and whose permission policy is
  # least-privilege: write under s3://habemus-papadum.net/aiui/* and
  # CreateInvalidation on one distribution — nothing else. The role ARN is not a
  # secret (it is only assumable via the OIDC trust above), so it lives here in
  # plaintext. Provisioned out-of-band in AWS account 789030644255; the resources
  # and the recreate commands are recorded in demos/gallery/PUBLISHING.md.
  publish-site:
    needs: [prepare, npm-publish]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: assume the AWS publish role — no stored secret
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # Source-first: the gallery builds from linked workspace source, so a plain
      # install is all the prep the vite build needs.
      - run: pnpm install --frozen-lockfile

      - name: Assume the AWS publish role (GitHub OIDC — no secret)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::789030644255:role/pdum-aiui-gallery-publish
          aws-region: us-east-1

      - name: Build demos/gallery and publish to S3 + invalidate CloudFront
        env:
          PUBLISH: "1" # real upload, not the script's default dry run
          CF_ID: E2OPILUJ3WDTIB # skip ListDistributions (role isn't allowed it)
        run: bash demos/gallery/publish.sh --publish

  # ---------------------------------------------------------------------------
  # Chrome Web Store publish — STUB, intentionally disabled ("zip now, store
  # later"). The release above ships a load-unpacked zip, which needs no account
  # and no secrets. A Web Store listing is the only path to one-click install +
  # auto-update in a user's everyday Chrome, but it costs: a $5 developer
  # account, OAuth secrets, and every release clears review (slower given this
  # extension's permission set — <all_urls>, tabCapture, scripting,
  # nativeMessaging). To enable:
  #   1. Create an UNLISTED item in the Chrome Web Store; note its item id.
  #   2. Provision OAuth creds (client id / secret / refresh token) per
  #      github.com/fregante/chrome-webstore-upload-keys and store them as repo
  #      secrets CWS_CLIENT_ID / CWS_CLIENT_SECRET / CWS_REFRESH_TOKEN, plus the
  #      item id as CWS_EXTENSION_ID.
  #   3. Uncomment this job and drop the `false &&` guard.
  #
  # chrome-web-store:
  #   needs: [prepare, github-release]
  #   if: ${{ false && !inputs.dry_run }}   # remove `false &&` to enable
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #       with:
  #         ref: ${{ needs.prepare.outputs.tag }}
  #     - uses: pnpm/action-setup@v4
  #     - uses: actions/setup-node@v5
  #       with:
  #         node-version-file: .nvmrc
  #         cache: pnpm
  #         cache-dependency-path: pnpm-lock.yaml
  #     - run: pnpm install --frozen-lockfile
  #     - name: Build and package the extension
  #       run: |
  #         pnpm --filter @habemus-papadum/aiui-intent-client run build:ext
  #         cd packages/aiui-intent-client/dist-ext && zip -r ../cws.zip .
  #     - name: Upload + publish to the Chrome Web Store
  #       run: npx chrome-webstore-upload-cli@3 upload --auto-publish
  #       working-directory: packages/aiui-intent-client
  #       env:
  #         EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
  #         CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
  #         CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
  #         REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
  #         # source: cws.zip  (chrome-webstore-upload-cli reads --source; wire as needed)

  finalize:
    needs: [prepare, npm-publish]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set the +dev marker and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/versioning.mjs set "${{ needs.prepare.outputs.version }}+dev"
          pnpm install --lockfile-only
          git commit -am "back to dev (${{ needs.prepare.outputs.version }}+dev)"
          git push origin "HEAD:${GITHUB_REF_NAME}"
