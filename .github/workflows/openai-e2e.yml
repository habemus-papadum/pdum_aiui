name: OpenAI E2E

# The intent pipeline's real-OpenAI micro-tier:
#  - openai-pipeline.e2e.ts — one ~2s REST transcription + one correction-diff
#    chat call + one short TTS ack (premium tier), asserting round-trip shape
#    (HTTP 200, non-empty text/audio, patch parses);
#  - openai-realtime.e2e.ts — one ~2s realtime (streaming) transcription session
#    over the live WebSocket GA endpoint, asserting ≥1 delta + a non-empty final
#    (streaming-turns.md §3, L1);
#  - openai-voice.e2e.ts — one short gpt-realtime-2 conversational turn (the
#    flagship tier), asserting the model answered aloud (≥1 audio clip) + a
#    non-empty reply/user transcript + a clean close (model-tiers.md T3). This one
#    is CENTS (one spoken reply), not fractions — still well within the cap.
# All assert round-trip SHAPE, not output quality.
# Like the Claude e2e (e2e.yml) they're too expensive/external for every push, so
# they run on a weekly cadence plus manual dispatch. Everything above this (unit
# tests) stays mocked; everything below (quality, latency curves, model
# comparisons) lives in the workbench bench/corpus runner, run by humans.

on:
  schedule:
    - cron: "30 9 * * 1" # Mondays 09:30 UTC (just after the Claude e2e)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  openai-e2e:
    runs-on: ubuntu-latest
    env:
      # A shared OpenAI key, scoped to a DEDICATED OpenAI project with a hard,
      # very low monthly spend cap — so a leak or a runaway loop is capped at the
      # budget, not the card. GitHub withholds secrets from fork PRs (same as
      # CLAUDE_CODE_OAUTH_TOKEN in ci.yml), so it never reaches untrusted
      # contributors, and the test skips itself when the key is absent — forks
      # and offline runs stay green.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # No build step: the test hits OpenAI directly and imports the workbench
      # correction prompt/patch applier + the channel's realtime session from
      # source (workspace source-first).
      - name: OpenAI round-trip (REST transcription + correction diff + TTS ack)
        run: pnpm exec vitest run --config vitest.e2e.config.ts openai-pipeline.e2e

      - name: OpenAI round-trip (realtime streaming transcription)
        run: pnpm exec vitest run --config vitest.e2e.config.ts openai-realtime.e2e

      - name: OpenAI round-trip (flagship gpt-realtime-2 voice turn)
        run: pnpm exec vitest run --config vitest.e2e.config.ts openai-voice.e2e
