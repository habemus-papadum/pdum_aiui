name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege for the build job; the deploy job needs Pages + OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys. Don't cancel an in-flight deploy — let it finish so a
# rapid succession of pushes to main can't leave Pages half-updated.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs (VitePress site + TypeDoc API from source)
        # DOCS_BASE must be the project Pages subpath (e.g. "/pdum_aiui/") so
        # assets resolve; config.ts reads it. Derived from the repo name so a
        # rename needs no edit here. docs:build runs docs:gen first, so no
        # separate package build is required (TypeDoc reads src/index.ts).
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: pnpm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
