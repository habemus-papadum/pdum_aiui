packages:
  - "packages/*"
  # In-repo demo apps (`pnpm new-demo <name>`): never published, but full workspace
  # members so their `@habemus-papadum/*` deps resolve to source via `workspace:^`.
  # Note this also enrolls them in version lockstep — scripts/versioning.mjs reads
  # the globs in this list, so every demo carries the shared version.
  - "demos/*"
  # demos/circle is a deliberately transient local scratch app (gitignored): its
  # worthwhile parts live on as the gallery's `circle` notebook page. Excluding
  # it here keeps it OUT of the committed lockfile and version lockstep, so a
  # clean clone (where the gitignored dir is absent) still installs
  # --frozen-lockfile. It won't resolve its workspace deps locally — that's the
  # cost of scratch status; the maintained copy is demos/gallery/src/pages/circle.
  - "!demos/circle"

# pnpm blocks dependency build scripts by default; allow the ones we trust.
# (esbuild ships a prebuilt binary but runs a postinstall to link it.)
allowBuilds:
  # @vscode/vsce (aiui-vscode's .vsix packager) drags these two in; neither
  # build script matters for `vsce package` — keytar's native build backs the
  # legacy credential store, vsce-sign's postinstall fetches its marketplace
  # signing binary — so both are explicitly denied, not trusted.
  "@vscode/vsce-sign": false
  esbuild: true
  keytar: false
